<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 访客登记系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a73e8, #1557b0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 8px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 14px;
      color: #999;
      margin-bottom: 36px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      height: 44px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
    }
    .btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a73e8, #1557b0);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-title">访客登记系统</div>
    <div class="login-subtitle">管理后台登录</div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入管理员用户名" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary">登 录</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');

      try {
        const resp = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (data.code === 0) {
          localStorage.setItem('admin_token', data.data.token);
          localStorage.setItem('admin_username', data.data.username);
          if (data.data.password_expired) {
            localStorage.setItem('force_password_change', '1');
          }
          window.location.href = '/admin/index.html';
        } else {
          // 显示锁定、剩余尝试次数或通用错误消息
          errorEl.textContent = data.message || '登录失败';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = '网络错误，请重试';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
